server.port=8081
spring.application.name=user-service

# Code-first: Hibernate tự tạo / cập nhật bảng dựa trên Entity
spring.jpa.hibernate.ddl-auto=update

# Cấu hình datasource dùng MySQL local (port mặc định 3306)
spring.datasource.url=jdbc:mysql://localhost:3307/demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=demo
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tắt Flyway vì đang dùng code-first, không dùng migration tay
spring.flyway.enabled=false

# Tắt LDAP auto-config khi không dùng LDAP server
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.ldap.LdapAutoConfiguration

# Eureka client
# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true