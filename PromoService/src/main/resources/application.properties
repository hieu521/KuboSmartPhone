server.port=8085
spring.application.name=promo-service

# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbit}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

app.rabbit.queue.campaign-applied=${RABBITMQ_QUEUE_CAMPAIGN_APPLIED:campaign.applied}

# AuthService
app.auth-service.base-url=${AUTH_SERVICE_BASE_URL:http://localhost:8083}
app.auth-service.admin-email=${AUTH_ADMIN_EMAIL:admin@example.com}
app.auth-service.admin-password=${AUTH_ADMIN_PASSWORD:admin123}

app.promo.chunk-size=${PROMO_CHUNK_SIZE:500}

# JWT secret must match AuthService
auth.jwt.secret=${AUTH_JWT_SECRET:ZGVtby1qd3Qtc2VjcmV0LWNoYW5nZW1lLW5vdC1zZWN1cmU=}

springdoc.swagger-ui.path=/swagger-ui.html
scalar.enabled=true
scalar.path=/scalar

