server.port=8084
spring.application.name=notification-service

# Load .env khi chạy local (mvn spring-boot:run). Docker Compose dùng env_file.
spring.config.import=optional:file:${user.dir}/../.env,optional:file:${user.dir}/.env

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbit}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

# Mail (cấu hình bằng biến môi trường của bạn)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}

# Queue
app.rabbit.queue.campaign-applied=${RABBITMQ_QUEUE_CAMPAIGN_APPLIED:campaign.applied}

# Eureka
# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

springdoc.swagger-ui.path=/swagger-ui.html

