server.port=8086
spring.application.name=product-service

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3310/product?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=product
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:product123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
