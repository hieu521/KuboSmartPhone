server.port=8088
spring.application.name=order-service

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3312/orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=orders
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:orders123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbit}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit123}

app.rabbit.order-created=${RABBITMQ_QUEUE_ORDER_CREATED:order.created}
app.rabbit.order-result=${RABBITMQ_QUEUE_ORDER_RESULT:order.result}

app.product-service.base-url=${PRODUCT_SERVICE_BASE_URL:http://localhost:8086}

# JWT secret must match AuthService
auth.jwt.secret=${AUTH_JWT_SECRET:ZGVtby1qd3Qtc2VjcmV0LWNoYW5nZW1lLW5vdC1zZWN1cmU=}

# Wait DB confirmation before returning response (B in MD)
app.order.confirm-timeout-ms=${ORDER_CONFIRM_TIMEOUT_MS:8000}

# Kênh đặt hàng thường (POST /orders) — cùng cơ chế Redis/Lua/Rabbit, admin seed stock cho promoId này
app.order.retail-promo-id=${ORDER_RETAIL_PROMO_ID:RETAIL}

# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

springdoc.swagger-ui.path=/swagger-ui.html
scalar.enabled=true
scalar.path=/scalar

