  # --- NotificationService (mail + WebSocket) - load .env qua env_file ---
  notification-service:
    build: ./NotificationService
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      RABBITMQ_HOST: rabbitmq
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_user_data:
  mysql_department_data:
  mysql_auth_data:
  rabbitmq_data:
  redis_data:
  mysql_product_data:
  mysql_inventory_data:
  mysql_order_data:
