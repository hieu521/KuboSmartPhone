apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-service
  namespace: javaspring
  labels:
    app.kubernetes.io/name: eureka-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eureka-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eureka-service
    spec:
      containers:
        - name: eureka
          image: javaspring/eureka-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            tcpSocket:
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-service
  namespace: javaspring
spec:
  selector:
    app.kubernetes.io/name: eureka-service
  ports:
    - port: 8761
      targetPort: 8761
