# Strategic merge: imagePullPolicy Always khi kéo từ Docker Hub.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: javaspring
spec:
  template:
    spec:
      containers:
        - name: auth-service
          imagePullPolicy: Always
