apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: javaspring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: javaspring/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/inventory?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: inventory
            - name: SPRING_DATASOURCE_PASSWORD
              value: inventory123
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            # Some Spring components read spring.redis.* directly; keep both forms to avoid fallback to localhost.
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"redis":{"host":"redis","port":6379}}}'
            - name: JAVA_TOOL_OPTIONS
              value: "-Dspring.redis.host=redis -Dspring.redis.port=6379"
            - name: APP_SEED_ENABLED
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 50
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: javaspring
spec:
  selector:
    app.kubernetes.io/name: inventory-service
  ports:
    - port: 8087
      targetPort: 8087
