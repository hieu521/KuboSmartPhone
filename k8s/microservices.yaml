apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  namespace: javaspring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apigateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apigateway
    spec:
      containers:
        - name: apigateway
          image: javaspring/apigateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_GATEWAY_DOWNSTREAM_USER_SERVICE
              value: "http://user-service:8081"
            - name: APP_GATEWAY_DOWNSTREAM_AUTH_SERVICE
              value: "http://auth-service:8083"
            - name: APP_GATEWAY_DOWNSTREAM_DEPARTMENT_SERVICE
              value: "http://department-service:8082"
            - name: APP_GATEWAY_DOWNSTREAM_ORDER_SERVICE
              value: "http://order-service:8088"
            - name: APP_GATEWAY_DOWNSTREAM_PROMO_SERVICE
              value: "http://promo-service:8085"
            - name: APP_GATEWAY_DOWNSTREAM_INVENTORY_SERVICE
              value: "http://inventory-service:8087"
            # Bucket4j distributed rate limit (Redis + Lettuce)
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway
  namespace: javaspring
spec:
  selector:
    app.kubernetes.io/name: apigateway
  ports:
    - port: 8080
      targetPort: 8080
