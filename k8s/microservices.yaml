# DB / Redis / RabbitMQ qua Service DNS trong namespace; Gateway proxy tới URL cố định (không Eureka).
# Build image trước: xem k8s/README.md và scripts/k8s-build-images.ps1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: javaspring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
    spec:
      containers:
        - name: auth-service
          image: javaspring/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: MYSQL_AUTH_HOST
              value: mysql
            - name: MYSQL_AUTH_PORT
              value: "3306"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            # Spring Boot 4 prefers spring.data.redis.*; set explicit env vars for safety.
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 50
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: javaspring
spec:
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: javaspring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
    spec:
      containers:
        - name: user-service
          image: javaspring/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/demo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: demo
            - name: SPRING_DATASOURCE_PASSWORD
              value: demo123
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 50
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: javaspring
spec:
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - port: 8081
      targetPort: 8081
