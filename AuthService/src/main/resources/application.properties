server.port=8083
spring.application.name=auth-service

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.datasource.url=jdbc:mysql://${MYSQL_AUTH_HOST:localhost}:${MYSQL_AUTH_PORT:3309}/auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_AUTH_USERNAME:auth}
spring.datasource.password=${MYSQL_AUTH_PASSWORD:auth123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

springdoc.swagger-ui.path=/swagger-ui.html
# Swagger Try-it-out: de trong = server tuong doi / (goi qua cung host Gateway). Hoac set day VD: http://api.javaspring.local:18080
# app.openapi.servers=http://api.javaspring.local:18080

# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

# Access token settings
auth.jwt.secret=${AUTH_JWT_SECRET:ZGVtby1qd3Qtc2VjcmV0LWNoYW5nZW1lLW5vdC1zZWN1cmU=}
auth.jwt.access-token-expiration-seconds=900

# Opaque refresh token settings
auth.refresh-token.expiration-seconds=2592000

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@example.com}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:admin123}
app.seed.user.email=${APP_SEED_USER_EMAIL:user@example.com}
app.seed.user.password=${APP_SEED_USER_PASSWORD:user123}

