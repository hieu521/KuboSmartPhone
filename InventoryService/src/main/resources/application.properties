server.port=8087
spring.application.name=inventory-service

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3311/inventory?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=inventory
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:inventory123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

auth.jwt.secret=${AUTH_JWT_SECRET:ZGVtby1qd3Qtc2VjcmV0LWNoYW5nZW1lLW5vdC1zZWN1cmU=}

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.promo-id=${APP_SEED_PROMO_ID:BF2026}
# Kênh bán lẻ (OrderService POST /orders) — cùng số lượng seed như flash sale
app.seed.retail-promo-id=${APP_SEED_RETAIL_PROMO_ID:RETAIL}

springdoc.swagger-ui.path=/swagger-ui.html
scalar.enabled=true
scalar.path=/scalar

