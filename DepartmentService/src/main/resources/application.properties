server.port=8082
spring.application.name=department-service

# Hibernate tự tạo / cập nhật bảng dựa trên Entity
spring.jpa.hibernate.ddl-auto=update

# Cấu hình datasource dùng MySQL local (container map port 3308)
spring.datasource.url=jdbc:mysql://localhost:3308/department?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=department
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Nếu không dùng Flyway, có thể tắt
spring.flyway.enabled=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.ldap.LdapAutoConfiguration

# Eureka client
# Eureka (tùy chọn — tắt khi chỉ dùng Kubernetes Service DNS / không đăng ký registry)
# eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
# eureka.instance.prefer-ip-address=true

